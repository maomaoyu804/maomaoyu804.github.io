pan><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">node</span>&#123;</span></span><br><span class="line">    <span class="keyword">long</span> <span class="keyword">long</span> f,s;</span><br><span class="line">&#125;a[<span class="number">100100</span>];</span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">cmp1</span><span class="params">(node x,node y)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (x.f==y.f) <span class="keyword">return</span> x.s&gt;y.s;</span><br><span class="line">    <span class="keyword">return</span> x.f&gt;y.f;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">long</span> <span class="keyword">long</span> m[<span class="number">100100</span>];</span><br><span class="line"><span class="keyword">int</span> n;</span><br><span class="line"><span class="built_in">set</span> &lt;<span class="keyword">long</span> <span class="keyword">long</span>&gt; q;</span><br><span class="line"><span class="built_in">set</span> &lt;<span class="keyword">long</span> <span class="keyword">long</span>&gt;::iterator it1;</span><br><span class="line"><span class="built_in">map</span> &lt;<span class="keyword">long</span> <span class="keyword">long</span>,<span class="keyword">int</span>&gt; mp;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> T;</span><br><span class="line">    <span class="comment">//freopen("in.txt","r",stdin); //输入重定向，输入数据将从in.txt文件中读取</span></span><br><span class="line">    <span class="comment">//freopen("data.txt","w",stdout);</span></span><br><span class="line">    <span class="built_in">scanf</span>(<span class="string">"%d"</span>,&amp;T);</span><br><span class="line">    <span class="keyword">while</span> (T--)&#123;</span><br><span class="line">        <span class="built_in">scanf</span>(<span class="string">"%d"</span>,&amp;n);</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> tt=<span class="number">1</span>;tt&lt;=n;tt++)&#123;</span><br><span class="line">            <span class="built_in">scanf</span>(<span class="string">"%lld%lld"</span>,&amp;a[tt].f,&amp;a[tt].s);</span><br><span class="line">            mp[a[tt].s]++;</span><br><span class="line">            q.insert(a[tt].s);</span><br><span class="line">        &#125;</span><br><span class="line">        sort(a+<span class="number">1</span>,a+<span class="number">1</span>+n,cmp1);</span><br><span class="line">        m[<span class="number">1</span>]=a[<span class="number">1</span>].s;</span><br><span class="line">        m[<span class="number">0</span>]=<span class="number">0</span>;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i=<span class="number">2</span>;i&lt;=n;i++)&#123;</span><br><span class="line">            m[i]=max(m[i<span class="number">-1</span>],a[i].s);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">long</span> <span class="keyword">long</span> ans=<span class="number">1e18</span>;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;i++)&#123;</span><br><span class="line">            mp[a[i].s]--;</span><br><span class="line">            <span class="keyword">if</span> (mp[a[i].s]==<span class="number">0</span>) q.erase(a[i].s);</span><br><span class="line">            <span class="keyword">long</span> <span class="keyword">long</span> maxx=a[i].f;</span><br><span class="line">            it1=q.lower_bound(maxx);</span><br><span class="line">            <span class="keyword">long</span> <span class="keyword">long</span> temp=m[i<span class="number">-1</span>];</span><br><span class="line">            <span class="keyword">if</span>(it1!=q.end())&#123;</span><br><span class="line">                <span class="keyword">if</span>(i!=<span class="number">1</span>)ans=min(ans,<span class="built_in">abs</span>(a[i].f-temp));</span><br><span class="line">                <span class="keyword">if</span>((*it1)&gt;=temp) ans=min(ans,<span class="built_in">abs</span>(a[i].f-(*it1)));</span><br><span class="line">                <span class="keyword">if</span>(it1!=q.begin()&amp;&amp;(*(--it1)&gt;temp)) &#123;</span><br><span class="line">                    ans=min(ans,<span class="built_in">abs</span>(a[i].f-(*it1)));</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">else</span>&#123;</span><br><span class="line">                ans=min(ans,<span class="built_in">abs</span>(a[i].f-temp));</span><br><span class="line">                <span class="keyword">if</span>(*(--it1)&gt;temp) ans=min(ans,<span class="built_in">abs</span>(a[i].f-*it1));</span><br><span class="line">            &#125;</span><br><span class="line">            mp[a[i].s]++;</span><br><span class="line">            q.insert(a[i].s);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"%lld\n"</span>,ans);</span><br><span class="line">        mp.clear();</span><br><span class="line">        q.clear();</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">//fclose(
